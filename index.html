<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>庫存盤點</title>
<style>
:root{
  --bg:#0f1117;--surface:#1a1d26;--surface2:#222636;--surface3:#2a2e40;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --accent:#4ade80;--accent-dim:rgba(74,222,128,0.13);
  --text:#f0f0f0;--text2:#8b90a0;--text3:#4a4f62;
  --red:#f87171;--red-dim:rgba(248,113,113,0.13);
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,0.13);
  --r:10px;--rs:7px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;
  font-size:16px;line-height:1.5}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}
.header{padding:12px 16px 10px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:17px;font-weight:600}
.header-sub{font-size:11px;color:var(--text2);margin-top:1px}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 84px}
.nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--surface);
  border-top:0.5px solid var(--border2);z-index:100;max-width:480px;margin:0 auto}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:9px 4px 13px;font-size:10px;color:var(--text2);cursor:pointer;
  border:none;background:none;font-family:inherit;transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:21px;line-height:1.1}
.page{display:none;padding:14px 14px 0}.page.active{display:block}

/* ── 庫別/儲位 鎖定區 ── */
.ctx-bar{background:var(--surface2);border:0.5px solid var(--border2);
  border-radius:var(--r);padding:10px 12px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;gap:10px}
.ctx-info{flex:1;min-width:0}
.ctx-label{font-size:10px;color:var(--text3);letter-spacing:.05em;font-weight:500}
.ctx-val{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctx-placeholder{font-size:14px;color:var(--text3)}
.ctx-sep{width:0.5px;height:32px;background:var(--border2);flex-shrink:0}
.ctx-change{font-size:12px;color:var(--accent);cursor:pointer;white-space:nowrap;padding:4px 6px;flex-shrink:0}

/* ── 掃描區塊（模態） ── */
.scan-modal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.85);
  display:none;flex-direction:column;align-items:center;justify-content:center}
.scan-modal.open{display:flex}
.scan-box{width:100%;max-width:440px;padding:0 16px}
.scan-title{font-size:15px;font-weight:600;color:#fff;text-align:center;margin-bottom:14px}
.scan-sub{font-size:12px;color:var(--text2);text-align:center;margin-bottom:20px}
video#preview{width:100%;border-radius:14px;background:#000;display:block;
  max-height:50vh;object-fit:cover}
.scan-input-wrap{margin-top:14px;display:flex;gap:8px}
.scan-input-wrap input{flex:1;background:var(--surface2);border:0.5px solid var(--border2);
  border-radius:var(--rs);padding:12px 14px;font-size:16px;color:var(--text);
  outline:none;-webkit-appearance:none;font-family:inherit}
.scan-input-wrap input:focus{border-color:var(--accent)}
.scan-confirm{padding:0 18px;background:var(--accent);border:none;border-radius:var(--rs);
  color:#0a1a0a;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.scan-cancel{margin-top:12px;width:100%;padding:12px;background:transparent;
  border:0.5px solid var(--border2);border-radius:var(--rs);color:var(--text2);
  font-size:15px;cursor:pointer;font-family:inherit}

/* ── 品號輸入列 ── */
.item-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:10px}
.item-row .field{flex:1;margin-bottom:0}
.scan-btn{width:46px;height:46px;background:var(--blue-dim);border:0.5px solid rgba(96,165,250,.35);
  border-radius:var(--rs);color:var(--blue);font-size:20px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s}
.scan-btn:active{background:rgba(96,165,250,.25)}

/* ── 數量列 ── */
.qty-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.qty-row label{font-size:12px;color:var(--text2);font-weight:500;width:28px;flex-shrink:0}
.qty-btn{width:44px;height:44px;border-radius:var(--rs);background:var(--surface2);
  border:0.5px solid var(--border2);color:var(--text);font-size:22px;display:flex;
  align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;user-select:none}
.qty-btn:active{background:var(--surface3)}
.qty-input{flex:1;text-align:center;height:44px;padding:0;background:var(--surface2);
  border:0.5px solid var(--border2);border-radius:var(--rs);font-size:18px;
  color:var(--text);outline:none;-webkit-appearance:none;font-family:inherit}
.qty-input:focus{border-color:var(--accent)}

/* ── 新增按鈕 ── */
.btn-add{width:100%;padding:14px;background:var(--accent);color:#0a1a0a;border:none;
  border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;
  font-family:inherit;letter-spacing:.02em;transition:opacity .15s}
.btn-add:active{opacity:.8}
.btn-add:disabled{opacity:.35;cursor:not-allowed}

/* ── 本儲位品項 ── */
.slot-items{margin-top:16px}
.slot-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.slot-title{font-size:11px;color:var(--text3);letter-spacing:.06em;font-weight:500;text-transform:uppercase}
.slot-count{font-size:11px;color:var(--text2)}
.item-list{display:flex;flex-direction:column;gap:6px}
.item-card{background:var(--surface);border:0.5px solid var(--border);
  border-radius:var(--rs);padding:10px 12px;display:flex;align-items:center;gap:10px}
.item-card-code{flex:1;font-size:14px;font-weight:600;color:var(--text);min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-card-time{font-size:10px;color:var(--text3);margin-top:1px}
.item-card-qty{font-size:18px;font-weight:700;color:var(--accent);flex-shrink:0}
.item-del{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;
  padding:2px 4px;flex-shrink:0;line-height:1}
.item-del:active{color:var(--red)}

/* ── 統計 ── */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{background:var(--surface2);border-radius:var(--r);padding:13px 14px;border:0.5px solid var(--border)}
.stat-val{font-size:26px;font-weight:600;color:var(--accent);line-height:1.1;letter-spacing:-.02em}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:2px}

/* ── 欄位通用 ── */
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500;letter-spacing:.03em}
.field input{width:100%;background:var(--surface2);border:0.5px solid var(--border2);
  border-radius:var(--rs);padding:12px 14px;font-size:16px;color:var(--text);
  outline:none;-webkit-appearance:none;font-family:inherit;transition:border-color .15s}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--text3)}

/* ── 查詢 ── */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{padding-left:38px;width:100%;background:var(--surface2);
  border:0.5px solid var(--border2);border-radius:var(--rs);padding-left:38px;
  padding-right:36px;height:44px;font-size:15px;color:var(--text);outline:none;
  -webkit-appearance:none;font-family:inherit}
.search-wrap input:focus{border-color:var(--accent)}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.sc{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text3);font-size:17px;cursor:pointer;padding:4px}
.rec{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);
  padding:11px 13px;margin-bottom:7px}
.rec-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.rec-item{font-size:14px;font-weight:600;color:var(--text)}
.rec-qty{font-size:17px;font-weight:700;color:var(--accent)}
.rec-meta{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;background:var(--surface2);
  font-size:11px;color:var(--text2)}
.rec-time{font-size:10px;color:var(--text3)}

/* ── 管理 ── */
.msec{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);
  padding:14px;margin-bottom:12px}
.msec-title{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:10px}
.stat4{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat4 .stat-val{font-size:20px}
.brow{display:flex;gap:8px;flex-wrap:wrap}
.bsuccess{padding:11px 16px;background:var(--accent-dim);border:0.5px solid rgba(74,222,128,.35);
  border-radius:var(--rs);font-size:14px;color:var(--accent);cursor:pointer;font-family:inherit;font-weight:500}
.bdanger{padding:11px 16px;background:var(--red-dim);border:0.5px solid rgba(248,113,113,.35);
  border-radius:var(--rs);font-size:14px;color:var(--red);cursor:pointer;font-family:inherit;font-weight:500}

/* ── Toast ── */
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--r);
  padding:10px 18px;font-size:13px;color:var(--text);z-index:500;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(74,222,128,.45);color:var(--accent)}
.toast.err{border-color:rgba(248,113,113,.45);color:var(--red)}

/* ── Confirm dialog ── */
.dlg-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:400;
  display:none;align-items:flex-end;justify-content:center}
.dlg-bg.open{display:flex}
.dlg{background:var(--surface);border-radius:18px 18px 0 0;
  padding:22px 18px 36px;width:100%;max-width:480px;border-top:0.5px solid var(--border2)}
.dlg h3{font-size:16px;font-weight:600;margin-bottom:7px}
.dlg p{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.7}
.dlg .brow button{flex:1;padding:13px;font-size:15px;border-radius:var(--r);font-weight:500}

.empty{text-align:center;padding:36px 16px;color:var(--text3)}
.empty-icon{font-size:36px;display:block;margin-bottom:8px}
.empty p{font-size:13px}

@media(min-width:481px){.nav,.app{left:50%;right:auto;width:480px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <h1>庫存盤點</h1>
      <span id="hd-count" style="font-size:12px;color:var(--text2)">共 0 筆</span>
    </div>
    <div class="header-sub" id="hd-time">──</div>
  </div>

  <div class="content">

    <!-- ══ 掃描盤點 ══ -->
    <div class="page active" id="page-scan">

      <!-- 庫別+儲位 情境列 -->
      <div class="ctx-bar" id="ctx-bar">
        <div class="ctx-info">
          <div class="ctx-label">庫別</div>
          <div id="ctx-wh-val" class="ctx-placeholder">尚未設定</div>
        </div>
        <div class="ctx-sep"></div>
        <div class="ctx-info">
          <div class="ctx-label">儲位</div>
          <div id="ctx-loc-val" class="ctx-placeholder">尚未設定</div>
        </div>
        <div class="ctx-sep"></div>
        <span class="ctx-change" id="ctx-change-btn">設定 ›</span>
      </div>

      <!-- 品號輸入列 -->
      <div class="item-row">
        <div class="field">
          <label>品號 / 條碼</label>
          <input type="text" id="f-item" placeholder="掃描或輸入品號" autocomplete="off" inputmode="text">
        </div>
        <button class="scan-btn" data-target="item" title="掃描品號條碼">📷</button>
      </div>

      <!-- 數量 -->
      <div class="qty-row">
        <label>數量</label>
        <button class="qty-btn" id="btn-minus">−</button>
        <input type="number" id="f-qty" class="qty-input" value="1" min="0" inputmode="numeric">
        <button class="qty-btn" id="btn-plus">+</button>
      </div>

      <button class="btn-add" id="btn-add">＋ 新增品號</button>

      <!-- 本儲位品項清單 -->
      <div class="slot-items">
        <div class="slot-header">
          <span class="slot-title">本儲位品項</span>
          <span class="slot-count" id="slot-count"></span>
        </div>
        <div id="slot-list" class="item-list"></div>
      </div>

      <!-- 全域統計 -->
      <div style="margin-top:18px">
        <div class="slot-header">
          <span class="slot-title">全域統計</span>
        </div>
        <div class="stats">
          <div class="stat"><div class="stat-val" id="s-items">0</div><div class="stat-lbl">不重複品項</div></div>
          <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">總數量</div></div>
        </div>
      </div>
    </div>

    <!-- ══ 查詢 ══ -->
    <div class="page" id="page-query">
      <div class="search-wrap">
        <span class="si">🔍</span>
        <input type="text" id="q-input" placeholder="搜尋庫別、儲位或品號…" autocomplete="off">
        <button class="sc" id="q-clear">✕</button>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-val" id="q-items">0</div><div class="stat-lbl">品項數</div></div>
        <div class="stat"><div class="stat-val" id="q-total">0</div><div class="stat-lbl">總數量</div></div>
      </div>
      <div id="q-list"></div>
    </div>

    <!-- ══ 管理 ══ -->
    <div class="page" id="page-manage">
      <div class="msec">
        <div class="msec-title">資料摘要</div>
        <div class="stat4">
          <div class="stat"><div class="stat-val" id="m-rec">0</div><div class="stat-lbl">紀錄筆數</div></div>
          <div class="stat"><div class="stat-val" id="m-total">0</div><div class="stat-lbl">總數量</div></div>
          <div class="stat"><div class="stat-val" id="m-items">0</div><div class="stat-lbl">品項數</div></div>
          <div class="stat"><div class="stat-val" id="m-wh">0</div><div class="stat-lbl">庫別數</div></div>
        </div>
      </div>
      <div class="msec">
        <div class="msec-title">操作</div>
        <div class="brow">
          <button class="bsuccess" id="btn-export">⬇ 匯出 CSV</button>
          <button class="bdanger" id="btn-clearall">🗑 清空資料</button>
        </div>
      </div>
      <div class="msec">
        <div class="msec-title">使用說明</div>
        <p style="font-size:13px;color:var(--text2);line-height:1.9">
          先掃庫別與儲位條碼（點「設定 ›」），鎖定後連續掃品號即可新增。<br>
          切換儲位時再點「設定 ›」重設。資料存於此裝置，匯出 CSV 可傳電腦。
        </p>
      </div>
    </div>

  </div><!-- /content -->

  <nav class="nav">
    <button class="nav-btn active" data-page="scan"><span class="nav-icon">📷</span>掃描盤點</button>
    <button class="nav-btn" data-page="query"><span class="nav-icon">🔍</span>查詢</button>
    <button class="nav-btn" data-page="manage"><span class="nav-icon">⚙️</span>管理</button>
  </nav>
</div>

<!-- ══ 掃描模態（庫別/儲位/品號共用） ══ -->
<div class="scan-modal" id="scan-modal">
  <div class="scan-box">
    <div class="scan-title" id="scan-modal-title">掃描條碼</div>
    <div class="scan-sub" id="scan-modal-sub">對準條碼，自動識別後帶入</div>
    <video id="preview" autoplay playsinline muted></video>
    <div class="scan-input-wrap">
      <input type="text" id="scan-manual" placeholder="或手動輸入後確認" autocomplete="off">
      <button class="scan-confirm" id="scan-confirm">確認</button>
    </div>
    <button class="scan-cancel" id="scan-cancel">取消</button>
  </div>
</div>

<!-- ══ 庫別/儲位設定模態 ══ -->
<div class="scan-modal" id="ctx-modal">
  <div class="scan-box">
    <div class="scan-title">設定庫別 / 儲位</div>
    <div class="scan-sub">逐一掃描或輸入後按確認</div>

    <div style="margin-bottom:12px">
      <div style="font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:500">庫別</div>
      <div style="display:flex;gap:8px">
        <input type="text" id="ctx-wh-input" placeholder="掃描或輸入庫別"
          style="flex:1;background:var(--surface2);border:0.5px solid var(--border2);
          border-radius:var(--rs);padding:12px 13px;font-size:16px;color:var(--text);
          outline:none;-webkit-appearance:none;font-family:inherit">
        <button class="scan-btn" id="ctx-scan-wh" style="height:46px">📷</button>
      </div>
    </div>
    <div style="margin-bottom:16px">
      <div style="font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:500">儲位</div>
      <div style="display:flex;gap:8px">
        <input type="text" id="ctx-loc-input" placeholder="掃描或輸入儲位"
          style="flex:1;background:var(--surface2);border:0.5px solid var(--border2);
          border-radius:var(--rs);padding:12px 13px;font-size:16px;color:var(--text);
          outline:none;-webkit-appearance:none;font-family:inherit">
        <button class="scan-btn" id="ctx-scan-loc" style="height:46px">📷</button>
      </div>
    </div>
    <button id="ctx-confirm"
      style="width:100%;padding:14px;background:var(--accent);color:#0a1a0a;border:none;
      border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px">
      確認設定
    </button>
    <button class="scan-cancel" id="ctx-cancel">取消</button>
  </div>
</div>

<!-- ══ Confirm 清空 ══ -->
<div class="dlg-bg" id="dlg-clear">
  <div class="dlg">
    <h3>確定清空所有資料？</h3>
    <p>所有盤點紀錄將永久刪除，無法復原。<br>建議先匯出 CSV 備份。</p>
    <div class="brow" style="gap:10px">
      <button class="bdanger" id="dlg-ok" style="flex:1;padding:13px;border-radius:var(--r);font-size:15px">確定清空</button>
      <button id="dlg-cancel"
        style="flex:1;padding:13px;border-radius:var(--r);font-size:15px;
        background:transparent;border:0.5px solid var(--border2);color:var(--text2);cursor:pointer;font-family:inherit">
        取消
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════ DATA ══════════════════ */
const KEY='inv_v3';
function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch{return[]}}
function save(d){localStorage.setItem(KEY,JSON.stringify(d))}
function pad(n){return String(n).padStart(2,'0')}
function fmt(iso){const d=new Date(iso);return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

/* ── 時鐘 ── */
function tick(){document.getElementById('hd-time').textContent=fmt(new Date().toISOString())}
tick();setInterval(tick,1000);

/* ── Toast ── */
let ttimer;
function toast(msg,t='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+t;
  clearTimeout(ttimer);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  ttimer=setTimeout(()=>el.classList.remove('show'),2200);
}

/* ══════════════════ 情境（庫別+儲位） ══════════════════ */
let curWh='',curLoc='';

function applyCtx(){
  const whEl=document.getElementById('ctx-wh-val');
  const locEl=document.getElementById('ctx-loc-val');
  const btnEl=document.getElementById('ctx-change-btn');
  if(curWh){
    whEl.textContent=curWh;whEl.className='ctx-val';
    locEl.textContent=curLoc||'未設定';locEl.className=curLoc?'ctx-val':'ctx-placeholder';
    btnEl.textContent='切換 ›';
  } else {
    whEl.textContent='尚未設定';whEl.className='ctx-placeholder';
    locEl.textContent='尚未設定';locEl.className='ctx-placeholder';
    btnEl.textContent='設定 ›';
  }
  renderSlot();
}

document.getElementById('ctx-change-btn').addEventListener('click',openCtxModal);

function openCtxModal(){
  document.getElementById('ctx-wh-input').value=curWh;
  document.getElementById('ctx-loc-input').value=curLoc;
  document.getElementById('ctx-modal').classList.add('open');
}
document.getElementById('ctx-cancel').addEventListener('click',()=>document.getElementById('ctx-modal').classList.remove('open'));
document.getElementById('ctx-confirm').addEventListener('click',()=>{
  const wh=document.getElementById('ctx-wh-input').value.trim();
  const loc=document.getElementById('ctx-loc-input').value.trim();
  if(!wh||!loc){toast('請填寫庫別與儲位','err');return}
  curWh=wh;curLoc=loc;
  document.getElementById('ctx-modal').classList.remove('open');
  applyCtx();
  stopCamera();
  document.getElementById('f-item').focus();
  toast('✓ 已設定：'+wh+' / '+loc);
});

/* ══════════════════ 條碼掃描器 ══════════════════ */
let scanStream=null,scanDetector=null,scanCallback=null,scanRAF=null;

function hasBarcodeAPI(){return 'BarcodeDetector' in window}

async function startCamera(targetInput){
  const modal=document.getElementById('scan-modal');
  const video=document.getElementById('preview');
  const manual=document.getElementById('scan-manual');
  manual.value='';
  modal.classList.add('open');
  manual.placeholder='或手動輸入後確認';

  if(!hasBarcodeAPI()){
    document.getElementById('scan-modal-sub').textContent='此裝置不支援相機掃描，請手動輸入';
    video.style.display='none';
    manual.focus();return;
  }
  video.style.display='block';
  document.getElementById('scan-modal-sub').textContent='對準條碼，自動識別後帶入';
  try{
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
    video.srcObject=scanStream;
    scanDetector=new BarcodeDetector({formats:['code_39','code_128','ean_13','ean_8','qr_code','data_matrix','pdf417','upc_a','upc_e','itf','codabar','code_93']});
    scanCallback=targetInput;
    detectLoop();
  }catch(e){
    document.getElementById('scan-modal-sub').textContent='無法存取相機，請手動輸入';
    video.style.display='none';
    manual.focus();
  }
}

function detectLoop(){
  const video=document.getElementById('preview');
  if(!scanDetector||!video.srcObject)return;
  scanDetector.detect(video).then(codes=>{
    if(codes.length>0){
      const val=codes[0].rawValue;
      finishScan(val);
    } else {
      scanRAF=requestAnimationFrame(detectLoop);
    }
  }).catch(()=>{scanRAF=requestAnimationFrame(detectLoop)});
}

function finishScan(val){
  stopCamera();
  document.getElementById('scan-modal').classList.remove('open');
  if(scanCallback) scanCallback(val);
  scanCallback=null;
}

function stopCamera(){
  cancelAnimationFrame(scanRAF);
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
  scanDetector=null;
  const video=document.getElementById('preview');
  video.srcObject=null;
}

document.getElementById('scan-cancel').addEventListener('click',()=>{
  stopCamera();
  document.getElementById('scan-modal').classList.remove('open');
});
document.getElementById('scan-confirm').addEventListener('click',()=>{
  const v=document.getElementById('scan-manual').value.trim();
  if(!v){toast('請輸入條碼值','err');return}
  finishScan(v);
});
document.getElementById('scan-manual').addEventListener('keydown',e=>{
  if(e.key==='Enter'){const v=e.target.value.trim();if(v)finishScan(v);}
});

/* 品號掃描按鈕 */
document.querySelector('.scan-btn[data-target="item"]').addEventListener('click',()=>{
  if(!curWh||!curLoc){toast('請先設定庫別與儲位','err');openCtxModal();return}
  document.getElementById('scan-modal-title').textContent='掃描品號條碼';
  startCamera(val=>{
    document.getElementById('f-item').value=val;
    document.getElementById('f-qty').select();
    toast('✓ 品號：'+val);
  });
});

/* 庫別/儲位模態內的掃描按鈕 */
document.getElementById('ctx-scan-wh').addEventListener('click',()=>{
  document.getElementById('scan-modal-title').textContent='掃描庫別條碼';
  startCamera(val=>{
    document.getElementById('ctx-wh-input').value=val;
    document.getElementById('ctx-loc-input').focus();
  });
});
document.getElementById('ctx-scan-loc').addEventListener('click',()=>{
  document.getElementById('scan-modal-title').textContent='掃描儲位條碼';
  startCamera(val=>{
    document.getElementById('ctx-loc-input').value=val;
  });
});

/* ══════════════════ 新增紀錄 ══════════════════ */
document.getElementById('btn-minus').addEventListener('click',()=>{
  const el=document.getElementById('f-qty');el.value=Math.max(0,(parseInt(el.value)||0)-1);
});
document.getElementById('btn-plus').addEventListener('click',()=>{
  const el=document.getElementById('f-qty');el.value=(parseInt(el.value)||0)+1;
});

function addRecord(){
  if(!curWh||!curLoc){toast('請先設定庫別與儲位','err');openCtxModal();return}
  const item=document.getElementById('f-item').value.trim();
  const qty=parseInt(document.getElementById('f-qty').value)||0;
  if(!item){toast('請輸入品號','err');document.getElementById('f-item').focus();return}
  const d=load();
  d.unshift({id:Date.now(),wh:curWh,loc:curLoc,item,qty,dt:new Date().toISOString()});
  save(d);
  document.getElementById('f-item').value='';
  document.getElementById('f-qty').value='1';
  document.getElementById('f-item').focus();
  updateAll();
  toast('✓ '+item+' × '+qty);
}

document.getElementById('btn-add').addEventListener('click',addRecord);
document.getElementById('f-item').addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const item=document.getElementById('f-item').value.trim();
    if(item){document.getElementById('f-qty').select();}
  }
});
document.getElementById('f-qty').addEventListener('keydown',e=>{if(e.key==='Enter')addRecord()});

/* ══════════════════ 渲染 ══════════════════ */
function renderSlot(){
  const all=load();
  const d=curWh&&curLoc ? all.filter(r=>r.wh===curWh&&r.loc===curLoc) : [];
  const el=document.getElementById('slot-list');
  const cnt=document.getElementById('slot-count');
  if(!curWh||!curLoc){
    el.innerHTML='<div class="empty"><span class="empty-icon">📍</span><p>請先設定庫別與儲位</p></div>';
    cnt.textContent='';return;
  }
  cnt.textContent=d.length+'筆';
  if(!d.length){
    el.innerHTML='<div class="empty"><span class="empty-icon">📦</span><p>此儲位尚無品項</p></div>';return;
  }
  el.innerHTML=d.map(r=>`
    <div class="item-card">
      <div style="flex:1;min-width:0">
        <div class="item-card-code">${esc(r.item)}</div>
        <div class="item-card-time">${fmt(r.dt)}</div>
      </div>
      <div class="item-card-qty">${r.qty}</div>
      <button class="item-del" data-id="${r.id}" title="刪除">✕</button>
    </div>`).join('');
  el.querySelectorAll('.item-del').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=parseInt(btn.dataset.id);
      const d2=load().filter(r=>r.id!==id);save(d2);updateAll();toast('已刪除');
    });
  });
}

function recCard(r){
  return `<div class="rec">
    <div class="rec-top"><span class="rec-item">${esc(r.item)}</span><span class="rec-qty">${r.qty}</span></div>
    <div class="rec-meta">
      <span class="tag">${esc(r.wh)}</span><span class="tag">${esc(r.loc)}</span>
      <span class="rec-time">${fmt(r.dt)}</span>
    </div>
  </div>`;
}

function updateAll(){
  const d=load();
  const items=new Set(d.map(r=>r.item)).size;
  const total=d.reduce((a,r)=>a+r.qty,0);
  document.getElementById('s-items').textContent=items;
  document.getElementById('s-total').textContent=total;
  document.getElementById('hd-count').textContent='共 '+d.length+' 筆';
  document.getElementById('m-rec').textContent=d.length;
  document.getElementById('m-total').textContent=total;
  document.getElementById('m-items').textContent=items;
  document.getElementById('m-wh').textContent=new Set(d.map(r=>r.wh)).size;
  renderSlot();
}

function renderQuery(){
  const q=(document.getElementById('q-input').value||'').toLowerCase();
  const all=load();
  const d=q?all.filter(r=>[r.wh,r.loc,r.item].some(v=>v.toLowerCase().includes(q))):all;
  document.getElementById('q-items').textContent=new Set(d.map(r=>r.item)).size;
  document.getElementById('q-total').textContent=d.reduce((a,r)=>a+r.qty,0);
  const el=document.getElementById('q-list');
  el.innerHTML=d.length ? d.map(recCard).join('')
    : '<div class="empty"><span class="empty-icon">🔍</span><p>查無符合資料</p></div>';
}
document.getElementById('q-input').addEventListener('input',renderQuery);
document.getElementById('q-clear').addEventListener('click',()=>{document.getElementById('q-input').value='';renderQuery()});

/* ══════════════════ NAV ══════════════════ */
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const pg=btn.dataset.page;
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b===btn));
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-'+pg).classList.add('active');
    if(pg==='query')renderQuery();
    if(pg==='manage')updateAll();
  });
});

/* ══════════════════ 匯出 / 清空 ══════════════════ */
document.getElementById('btn-export').addEventListener('click',()=>{
  const d=load();
  if(!d.length){toast('沒有資料可匯出','err');return}
  const bom='\uFEFF';
  const hdr='日期時間,庫別,儲位,品號,數量\n';
  const rows=d.map(r=>[fmt(r.dt),r.wh,r.loc,r.item,r.qty].map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([bom+hdr+rows],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download='盤點_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();URL.revokeObjectURL(url);
  toast('✓ CSV 已下載（'+d.length+' 筆）');
});
document.getElementById('btn-clearall').addEventListener('click',()=>document.getElementById('dlg-clear').classList.add('open'));
document.getElementById('dlg-cancel').addEventListener('click',()=>document.getElementById('dlg-clear').classList.remove('open'));
document.getElementById('dlg-ok').addEventListener('click',()=>{
  localStorage.removeItem(KEY);
  document.getElementById('dlg-clear').classList.remove('open');
  updateAll();renderQuery();toast('已清空所有資料');
});
document.getElementById('dlg-clear').addEventListener('click',e=>{
  if(e.target===document.getElementById('dlg-clear'))document.getElementById('dlg-clear').classList.remove('open');
});

/* ── init ── */
applyCtx();updateAll();
</script>
</body>
</html>
